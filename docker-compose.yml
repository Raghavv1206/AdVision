# /advision-project/docker-compose.yml
version: '3.9'

services:
  
  db:
    image: postgres:15-alpine
    container_name: advision_db
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    env_file:
      - .env # Loads POSTGRES_DB, USER, PASSWORD
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: advision_redis
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: advision_backend
    command: gunicorn backend.wsgi:application --bind 0.0.0.0:8000
    volumes:
      - ./backend:/app
      # - static_volume:/app/staticfiles # If using collectstatic
      # - media_volume:/app/mediafiles # If using FileField
    expose:
      - 8000
    env_file:
      - .env # Loads SECRET_KEY, DB_URL, AI_KEYS
    depends_on:
      - db
      - redis
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: advision_frontend
    ports:
      - "80:80" # Expose Nginx to the host
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  # static_volume:
  # media_volume: